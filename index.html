<!DOCTYPE html>
<html>
  <head>
    <title>A-Frame: Summer Forest Scene</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sky color="#87CEEB"></a-sky>
      <a-sphere position="20 25 -30" radius="3" color="#FFD700" shader="flat"></a-sphere>

      <a-entity id="cloud-bank">
        <a-entity position="-15 15 -15">
          <a-sphere radius="1.5" color="white"></a-sphere>
          <a-sphere position="1.2 0.5 0" radius="1.2" color="white"></a-sphere>
          <a-sphere position="-1 0.2 0.5" radius="1" color="white"></a-sphere>
        </a-entity>
        <a-entity position="5 18 -20">
          <a-sphere radius="2" color="white"></a-sphere>
          <a-sphere position="1.5 -0.5 0" radius="1.3" color="white"></a-sphere>
          <a-sphere position="-1.5 0 0.5" radius="1.5" color="white"></a-sphere>
        </a-entity>
        <a-entity position="18 14 -10">
          <a-sphere radius="1.2" color="white"></a-sphere>
          <a-sphere position="1 0.2 0" radius="0.9" color="white"></a-sphere>
        </a-entity>
      </a-entity>

      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#228B22"></a-plane>

      <a-entity id="summer-hut" position="0 0 -7">
        <a-cylinder radius="4.5" height="0.2" color="#BDC3C7"></a-cylinder> <a-cone position="0 4.5 0" radius-bottom="5" radius-top="0" height="2.5" color="#E67E22"></a-cone> <a-cylinder position="3.8 2 0" radius="0.12" height="4" color="#7F8C8D"></a-cylinder>
        <a-cylinder position="-3.8 2 0" radius="0.12" height="4" color="#7F8C8D"></a-cylinder>
        <a-cylinder position="0 2 3.8" radius="0.12" height="4" color="#7F8C8D"></a-cylinder>
        <a-cylinder position="0 2 -3.8" radius="0.12" height="4" color="#7F8C8D"></a-cylinder>
        
        <a-entity id="table-group" position="0 0.1 0">
            <a-box position="0 1.1 0" width="2.8" height="0.1" depth="1.8" color="#5D4037"></a-box> <a-cylinder position="1.1 0.5 0.7" radius="0.08" height="1" color="#5D4037"></a-cylinder>
            <a-cylinder position="-1.1 0.5 0.7" radius="0.08" height="1" color="#5D4037"></a-cylinder>
            <a-cylinder position="1.1 0.5 -0.7" radius="0.08" height="1" color="#5D4037"></a-cylinder>
            <a-cylinder position="-1.1 0.5 -0.7" radius="0.08" height="1" color="#5D4037"></a-cylinder>

            <a-cylinder position="0.5 1.35 0.2" radius="0.18" height="0.45" color="#006400"></a-cylinder> <a-cylinder position="0.8 1.3 0" radius="0.15" height="0.38" color="#FFFFFF"></a-cylinder> <a-cylinder position="-0.6 1.16 0.4" radius="0.3" height="0.02" color="#FFFFFF"></a-cylinder>
            <a-cylinder position="-0.6 1.25 0.4" radius="0.1" height="0.2" color="#DDDDDD"></a-cylinder>
            <a-cylinder position="-0.6 1.16 -0.4" radius="0.3" height="0.02" color="#FFFFFF"></a-cylinder>
            <a-cylinder position="-0.6 1.25 -0.4" radius="0.1" height="0.2" color="#DDDDDD"></a-cylinder>
            <a-box position="0.3 1.16 0.2" width="0.4" height="0.01" depth="0.05" color="#BDC3C7"></a-box> </a-entity>

        <a-entity position="-2 0.1 0" rotation="0 90 0">
            <a-box position="0 0.5 0" width="0.8" height="0.1" depth="0.8" color="#5D4037"></a-box>
            <a-box position="0 1 -0.35" width="0.8" height="0.9" depth="0.1" color="#5D4037"></a-box>
            <a-cylinder position="0.3 0.25 0.3" radius="0.04" height="0.5" color="#5D4037"></a-cylinder>
            <a-cylinder position="-0.3 0.25 0.3" radius="0.04" height="0.5" color="#5D4037"></a-cylinder>
            <a-cylinder position="0.3 0.25 -0.3" radius="0.04" height="0.5" color="#5D4037"></a-cylinder>
            <a-cylinder position="-0.3 0.25 -0.3" radius="0.04" height="0.5" color="#5D4037"></a-cylinder>
            <a-entity position="0 0.56 0">
                <a-cylinder radius="0.35" height="0.02" color="#F5DEB3"></a-cylinder>
                <a-cone position="0 0.1 0" radius-bottom="0.18" height="0.2" color="#F5DEB3"></a-cone>
            </a-entity>
        </a-entity>

        <a-entity position="2 0.1 0" rotation="0 -90 0">
            <a-box position="0 0.5 0" width="0.8" height="0.1" depth="0.8" color="#5D4037"></a-box>
            <a-box position="0 1 -0.35" width="0.8" height="0.9" depth="0.1" color="#5D4037"></a-box>
            <a-cylinder position="0.3 0.25 0.3" radius="0.04" height="0.5" color="#5D4037"></a-cylinder>
            <a-cylinder position="-0.3 0.25 0.3" radius="0.04" height="0.5" color="#5D4037"></a-cylinder>
            <a-cylinder position="0.3 0.25 -0.3" radius="0.04" height="0.5" color="#5D4037"></a-cylinder>
            <a-cylinder position="-0.3 0.25 -0.3" radius="0.04" height="0.5" color="#5D4037"></a-cylinder>
        </a-entity>
      </a-entity>

      <a-entity id="forest-left">
        <a-entity position="-15 0 -15"><a-cylinder radius="0.3" height="3" color="#3d2b1f"></a-cylinder><a-cone position="0 4 0" radius-bottom="2" height="5" color="#1a4d1a"></a-cone></a-entity>
        <a-entity position="-10 0 -25"><a-cylinder radius="0.2" height="2" color="#3d2b1f"></a-cylinder><a-cone position="0 3 0" radius-bottom="1.5" height="4" color="#1a4d1a"></a-cone></a-entity>
        <a-entity position="-20 0 -20"><a-cylinder radius="0.4" height="4" color="#3d2b1f"></a-cylinder><a-cone position="0 6 0" radius-bottom="2.5" height="7" color="#1a4d1a"></a-cone></a-entity>
      </a-entity>

      <a-entity id="forest-right">
        <a-entity position="15 0 -18"><a-cylinder radius="0.3" height="3" color="#3d2b1f"></a-cylinder><a-cone position="0 4 0" radius-bottom="2" height="5" color="#1a4d1a"></a-cone></a-entity>
        <a-entity position="25 0 -22"><a-cylinder radius="0.2" height="2" color="#3d2b1f"></a-cylinder><a-cone position="0 3 0" radius-bottom="1.5" height="4" color="#1a4d1a"></a-cone></a-entity>
        <a-entity position="10 0 -30"><a-cylinder radius="0.4" height="4" color="#3d2b1f"></a-cylinder><a-cone position="0 6 0" radius-bottom="2.5" height="7" color="#1a4d1a"></a-cone></a-entity>
      </a-entity>

      <a-entity position="0 4 12">
        <a-camera></a-camera>
      </a-entity>
    </a-scene>
  </body>
</html>
